name: .NET Desktop

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            "APP_VERSION=$($env:GITHUB_REF_NAME.TrimStart('v'))" >> $env:GITHUB_ENV
          } else {
            "APP_VERSION=1.0.0" >> $env:GITHUB_ENV
          }

      - name: Restore
        run: dotnet restore CarbonioGoogleCalendarSync.sln

      - name: Build
        run: dotnet build CarbonioGoogleCalendarSync.sln --configuration Release --no-restore -p:Version=${{ env.APP_VERSION }} -p:AssemblyVersion=${{ env.APP_VERSION }}.0 -p:FileVersion=${{ env.APP_VERSION }}.0 -p:InformationalVersion=${{ env.APP_VERSION }}

      - name: Test
        run: dotnet test CarbonioGoogleCalendarSync.sln --configuration Release --no-build --verbosity normal

      - name: Publish win-x64 package
        if: github.event_name == 'push'
        run: .\scripts\Publish-WinX64.ps1 -Version $env:APP_VERSION

      - name: Upload win-x64 package
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: CarbonioGoogleCalendarSync-win-x64
          path: publish\win-x64
          if-no-files-found: error

      - name: Create release package
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path publish\win-x64\* -DestinationPath CarbonioGoogleCalendarSync-win-x64.zip -Force

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create $env:GITHUB_REF_NAME
          CarbonioGoogleCalendarSync-win-x64.zip
          --title "CarbonioGoogleCalendarSync $env:GITHUB_REF_NAME"
          --generate-notes
